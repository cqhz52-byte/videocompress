<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#0e7c66" />
    <meta name="description" content="???????????????????" />
    <title>???????????</title>
    <link rel="manifest" href="./manifest.webmanifest" />
    <link rel="icon" href="./icons/icon.svg" type="image/svg+xml" />
    <link rel="apple-touch-icon" href="./icons/icon.svg" />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="shell">
      <section class="workspace" aria-label="??????">
        <header class="topbar">
          <div>
            <p class="eyebrow">Mobile Video Studio</p>
            <h1>?????????</h1>
            <p class="version-line">?? v0.3.6</p>
          </div>
          <div class="privacy-pill">
            <i data-lucide="shield-check" aria-hidden="true"></i>
            <span>??????</span>
          </div>
        </header>

        <nav class="tabs" aria-label="????">
          <button class="tab is-active" type="button" data-tab="compress">
            <i data-lucide="minimize-2" aria-hidden="true"></i>
            <span>??</span>
          </button>
          <button class="tab" type="button" data-tab="subtitle">
            <i data-lucide="captions" aria-hidden="true"></i>
            <span>????</span>
          </button>
        </nav>

        <div class="main-grid">
          <section class="drop-panel" aria-label="????">
            <input id="fileInput" type="file" accept="video/*" hidden />
            <button id="dropZone" class="drop-zone" type="button">
              <span class="drop-icon">
                <i data-lucide="video" aria-hidden="true"></i>
              </span>
              <span class="drop-title">?????????</span>
              <span class="drop-subtitle">?? MP4?MOV?WebM ?????</span>
            </button>

            <div id="fileSummary" class="file-summary is-hidden">
              <div>
                <p id="fileName" class="file-name"></p>
                <p id="fileMeta" class="muted"></p>
              </div>
              <button id="clearFile" class="icon-button" type="button" aria-label="????" title="????">
                <i data-lucide="x" aria-hidden="true"></i>
              </button>
            </div>

            <video id="preview" class="preview is-hidden" controls muted playsinline></video>
          </section>

          <aside id="compressPanel" class="controls panel is-active" aria-label="????">
            <div class="control-block">
              <div class="block-heading">
                <i data-lucide="gauge" aria-hidden="true"></i>
                <h2>????</h2>
              </div>
              <div class="preset-grid" role="radiogroup" aria-label="????">
                <label class="preset is-active">
                  <input type="radio" name="preset" value="small" checked />
                  <span>??</span>
                  <small>??????</small>
                </label>
                <label class="preset">
                  <input type="radio" name="preset" value="balanced" />
                  <span>??</span>
                  <small>???????</small>
                </label>
                <label class="preset">
                  <input type="radio" name="preset" value="clear" />
                  <span>???</span>
                  <small>??????</small>
                </label>
              </div>
            </div>

            <div class="control-row">
              <label for="resolution">???</label>
              <select id="resolution">
                <option value="720">720p</option>
                <option value="1080" selected>1080p</option>
                <option value="1440">1440p</option>
                <option value="source">?????</option>
              </select>
            </div>

            <div class="control-row">
              <label for="quality">??</label>
              <div class="range-wrap">
                <input id="quality" type="range" min="23" max="36" value="30" />
                <output id="qualityLabel" for="quality">??</output>
              </div>
            </div>

            <div class="control-row">
              <label for="stripAudio">??</label>
              <label class="switch">
                <input id="stripAudio" type="checkbox" />
                <span>????</span>
              </label>
            </div>

            <div class="control-row">
              <label for="compressMode">????</label>
              <select id="compressMode">
                <option value="auto" selected>??</option>
                <option value="native">????</option>
                <option value="ffmpeg">?? MP4</option>
              </select>
            </div>

            <button id="compressBtn" class="primary-button" type="button" disabled>
              <i data-lucide="minimize-2" aria-hidden="true"></i>
              <span>????</span>
            </button>
          </aside>

          <aside id="subtitlePanel" class="controls panel" aria-label="??????">
            <div class="control-block">
              <div class="block-heading">
                <i data-lucide="languages" aria-hidden="true"></i>
                <h2>????</h2>
              </div>
              <div class="preset-grid" role="radiogroup" aria-label="????">
                <label class="preset is-active">
                  <input type="radio" name="subtitleMode" value="speech" checked />
                  <span>?????</span>
                  <small>??????????????????</small>
                </label>
                <label class="preset">
                  <input type="radio" name="subtitleMode" value="ocr" />
                  <span>?????</span>
                  <small>???? OCR???????</small>
                </label>
              </div>
            </div>

            <div class="control-row">
              <label for="sourceLang">???</label>
              <select id="sourceLang">
                <option value="en" selected>??</option>
                <option value="zh">??</option>
                <option value="ja">??</option>
                <option value="ko">??</option>
                <option value="fr">??</option>
                <option value="de">??</option>
                <option value="ru">??</option>
              </select>
            </div>

            <div class="control-row">
              <label for="targetLang">????</label>
              <select id="targetLang">
                <option value="zh-CN" selected>????</option>
                <option value="zh-TW">????</option>
                <option value="en">??</option>
              </select>
            </div>

            <div id="ocrOptions" class="ocr-options is-hidden">
              <div class="control-row">
                <label for="ocrInterval">????</label>
                <select id="ocrInterval">
                  <option value="1.5">1.5 ?</option>
                  <option value="2" selected>2 ?</option>
                  <option value="3">3 ?</option>
                </select>
              </div>
              <div class="control-row">
                <label for="ocrCrop">????</label>
                <select id="ocrCrop">
                  <option value="0.35" selected>?? 35%</option>
                  <option value="0.45">?? 45%</option>
                  <option value="0.25">?? 25%</option>
                </select>
              </div>
            </div>

            <details class="api-settings">
              <summary>
                <i data-lucide="key-round" aria-hidden="true"></i>
                <span>????</span>
              </summary>
              <div class="field-stack">
                <label>
                  <span>DeepSeek Key</span>
                  <input id="deepseekKey" type="password" autocomplete="off" placeholder="sk-..." />
                </label>
                <label class="switch setting-switch">
                  <input id="saveApiSettings" type="checkbox" checked />
                  <span>????????</span>
                </label>
              </div>
            </details>

            <button id="subtitleBtn" class="primary-button" type="button" disabled>
              <i data-lucide="sparkles" aria-hidden="true"></i>
              <span>??????</span>
            </button>
          </aside>
        </div>

        <section id="progressPanel" class="progress-panel is-hidden" aria-live="polite">
          <div class="progress-meta">
            <span id="statusText">???</span>
            <span id="progressText">0%</span>
          </div>
          <div class="progress-track">
            <div id="progressBar" class="progress-bar"></div>
          </div>
        </section>

        <section id="resultPanel" class="result-panel is-hidden" aria-label="????">
          <div>
            <p class="eyebrow">Result</p>
            <h2>????</h2>
          </div>
          <div class="stats">
            <div>
              <span>???</span>
              <strong id="beforeSize">-</strong>
            </div>
            <div>
              <span>???</span>
              <strong id="afterSize">-</strong>
            </div>
            <div>
              <span>??</span>
              <strong id="savedSize">-</strong>
            </div>
          </div>
          <a id="downloadLink" class="download-button" href="#" download>
            <i data-lucide="download" aria-hidden="true"></i>
            <span>??????</span>
          </a>
        </section>

        <section id="subtitleResult" class="subtitle-result is-hidden" aria-label="????">
          <div class="subtitle-head">
            <div>
              <p class="eyebrow">Subtitles</p>
              <h2>???????</h2>
            </div>
            <div class="result-actions">
              <a id="downloadZhSrt" class="download-button" href="#" download="translated.zh.srt">
                <i data-lucide="download" aria-hidden="true"></i>
                <span>????</span>
              </a>
              <a id="downloadBilingualSrt" class="download-button secondary" href="#" download="bilingual.srt">
                <i data-lucide="download" aria-hidden="true"></i>
                <span>????</span>
              </a>
            </div>
          </div>
          <textarea id="subtitlePreview" readonly spellcheck="false"></textarea>
        </section>

        <section id="audioResult" class="subtitle-result is-hidden" aria-label="??????">
          <div class="subtitle-head">
            <div>
              <p class="eyebrow">Local Audio</p>
              <h2>????????</h2>
            </div>
            <div class="result-actions">
              <a id="downloadAudio" class="download-button" href="#" download>
                <i data-lucide="download" aria-hidden="true"></i>
                <span>????</span>
              </a>
            </div>
          </div>
          <audio id="audioPreview" class="audio-preview" controls></audio>
        </section>

        <p id="errorBox" class="error-box is-hidden" role="alert"></p>
      </section>
    </main>

    <div id="updateToast" class="update-toast is-hidden" role="status">
      <span id="updateText">?????</span>
      <button id="reloadUpdate" type="button">????</button>
      <button id="clearCacheUpdate" type="button" class="ghost-update">????</button>
    </div>

    <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
    <script type="module" src="./app.js"></script>
  </body>
</html>
