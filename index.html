<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#0e7c66" />
    <meta name="description" content="在手机浏览器压缩视频，并生成翻译字幕。" />
    <title>手机视频压缩与字幕翻译</title>
    <link rel="manifest" href="./manifest.webmanifest" />
    <link rel="icon" href="./icons/icon.svg" type="image/svg+xml" />
    <link rel="apple-touch-icon" href="./icons/icon.svg" />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="shell">
      <section class="workspace" aria-label="手机视频工具">
        <header class="topbar">
          <div>
            <p class="eyebrow">Mobile Video Studio</p>
            <h1>视频压缩与字幕翻译</h1>
            <p class="version-line">版本 v0.3.1</p>
          </div>
          <div class="privacy-pill">
            <i data-lucide="shield-check" aria-hidden="true"></i>
            <span>视频本地处理</span>
          </div>
        </header>

        <nav class="tabs" aria-label="功能切换">
          <button class="tab is-active" type="button" data-tab="compress">
            <i data-lucide="minimize-2" aria-hidden="true"></i>
            <span>压缩</span>
          </button>
          <button class="tab" type="button" data-tab="subtitle">
            <i data-lucide="captions" aria-hidden="true"></i>
            <span>字幕翻译</span>
          </button>
        </nav>

        <div class="main-grid">
          <section class="drop-panel" aria-label="选择视频">
            <input id="fileInput" type="file" accept="video/*" hidden />
            <button id="dropZone" class="drop-zone" type="button">
              <span class="drop-icon">
                <i data-lucide="video" aria-hidden="true"></i>
              </span>
              <span class="drop-title">选择或拖入手机视频</span>
              <span class="drop-subtitle">支持 MP4、MOV、WebM 等常见格式</span>
            </button>

            <div id="fileSummary" class="file-summary is-hidden">
              <div>
                <p id="fileName" class="file-name"></p>
                <p id="fileMeta" class="muted"></p>
              </div>
              <button id="clearFile" class="icon-button" type="button" aria-label="移除视频" title="移除视频">
                <i data-lucide="x" aria-hidden="true"></i>
              </button>
            </div>

            <video id="preview" class="preview is-hidden" controls muted playsinline></video>
          </section>

          <aside id="compressPanel" class="controls panel is-active" aria-label="压缩设置">
            <div class="control-block">
              <div class="block-heading">
                <i data-lucide="gauge" aria-hidden="true"></i>
                <h2>压缩档位</h2>
              </div>
              <div class="preset-grid" role="radiogroup" aria-label="压缩档位">
                <label class="preset is-active">
                  <input type="radio" name="preset" value="small" checked />
                  <span>更小</span>
                  <small>适合微信发送</small>
                </label>
                <label class="preset">
                  <input type="radio" name="preset" value="balanced" />
                  <span>均衡</span>
                  <small>清晰和体积兼顾</small>
                </label>
                <label class="preset">
                  <input type="radio" name="preset" value="clear" />
                  <span>更清晰</span>
                  <small>保留更多细节</small>
                </label>
              </div>
            </div>

            <div class="control-row">
              <label for="resolution">最长边</label>
              <select id="resolution">
                <option value="720">720p</option>
                <option value="1080" selected>1080p</option>
                <option value="1440">1440p</option>
                <option value="source">保持原尺寸</option>
              </select>
            </div>

            <div class="control-row">
              <label for="quality">画质</label>
              <div class="range-wrap">
                <input id="quality" type="range" min="23" max="36" value="30" />
                <output id="qualityLabel" for="quality">普通</output>
              </div>
            </div>

            <div class="control-row">
              <label for="stripAudio">音频</label>
              <label class="switch">
                <input id="stripAudio" type="checkbox" />
                <span>去除声音</span>
              </label>
            </div>

            <button id="compressBtn" class="primary-button" type="button" disabled>
              <i data-lucide="minimize-2" aria-hidden="true"></i>
              <span>开始压缩</span>
            </button>
          </aside>

          <aside id="subtitlePanel" class="controls panel" aria-label="字幕翻译设置">
            <div class="control-block">
              <div class="block-heading">
                <i data-lucide="languages" aria-hidden="true"></i>
                <h2>字幕来源</h2>
              </div>
              <div class="preset-grid" role="radiogroup" aria-label="字幕来源">
                <label class="preset is-active">
                  <input type="radio" name="subtitleMode" value="speech" checked />
                  <span>语音转字幕</span>
                  <small>上传音频到阿里识别，再翻译成中文</small>
                </label>
                <label class="preset">
                  <input type="radio" name="subtitleMode" value="ocr" />
                  <span>硬字幕识别</span>
                  <small>手机截帧 OCR，翻译画面字幕</small>
                </label>
              </div>
            </div>

            <div class="control-row">
              <label for="sourceLang">原语言</label>
              <select id="sourceLang">
                <option value="en" selected>英语</option>
                <option value="zh">中文</option>
                <option value="ja">日语</option>
                <option value="ko">韩语</option>
                <option value="fr">法语</option>
                <option value="de">德语</option>
                <option value="ru">俄语</option>
              </select>
            </div>

            <div class="control-row">
              <label for="targetLang">目标语言</label>
              <select id="targetLang">
                <option value="zh-CN" selected>简体中文</option>
                <option value="zh-TW">繁体中文</option>
                <option value="en">英语</option>
              </select>
            </div>

            <div id="ocrOptions" class="ocr-options is-hidden">
              <div class="control-row">
                <label for="ocrInterval">截帧间隔</label>
                <select id="ocrInterval">
                  <option value="1.5">1.5 秒</option>
                  <option value="2" selected>2 秒</option>
                  <option value="3">3 秒</option>
                </select>
              </div>
              <div class="control-row">
                <label for="ocrCrop">字幕区域</label>
                <select id="ocrCrop">
                  <option value="0.35" selected>底部 35%</option>
                  <option value="0.45">底部 45%</option>
                  <option value="0.25">底部 25%</option>
                </select>
              </div>
            </div>

            <details class="api-settings" open>
              <summary>
                <i data-lucide="key-round" aria-hidden="true"></i>
                <span>API 设置</span>
              </summary>
              <div class="field-stack">
                <label>
                  <span>阿里百炼 Key</span>
                  <input id="dashscopeKey" type="password" autocomplete="off" placeholder="sk-..." />
                </label>
                <label>
                  <span>DeepSeek Key</span>
                  <input id="deepseekKey" type="password" autocomplete="off" placeholder="sk-..." />
                </label>
                <details class="advanced-settings">
                  <summary>阿里 OSS 高级设置</summary>
                  <label>
                    <span>OSS AccessKey ID</span>
                    <input id="ossAccessKeyId" type="password" autocomplete="off" />
                  </label>
                  <label>
                    <span>OSS AccessKey Secret</span>
                    <input id="ossAccessKeySecret" type="password" autocomplete="off" />
                  </label>
                  <div class="split-fields">
                    <label>
                      <span>OSS Region</span>
                      <input id="ossRegion" type="text" value="oss-cn-hangzhou" autocomplete="off" />
                    </label>
                    <label>
                      <span>OSS Bucket</span>
                      <input id="ossBucket" type="text" autocomplete="off" />
                    </label>
                  </div>
                  <label>
                    <span>OSS Prefix</span>
                    <input id="ossPrefix" type="text" value="videocompress/audio" autocomplete="off" />
                  </label>
                </details>
                <label class="switch setting-switch">
                  <input id="saveApiSettings" type="checkbox" checked />
                  <span>保存在本机浏览器</span>
                </label>
              </div>
            </details>

            <button id="subtitleBtn" class="primary-button" type="button" disabled>
              <i data-lucide="sparkles" aria-hidden="true"></i>
              <span>生成中文字幕</span>
            </button>
          </aside>
        </div>

        <section id="progressPanel" class="progress-panel is-hidden" aria-live="polite">
          <div class="progress-meta">
            <span id="statusText">准备中</span>
            <span id="progressText">0%</span>
          </div>
          <div class="progress-track">
            <div id="progressBar" class="progress-bar"></div>
          </div>
        </section>

        <section id="resultPanel" class="result-panel is-hidden" aria-label="压缩结果">
          <div>
            <p class="eyebrow">Result</p>
            <h2>压缩完成</h2>
          </div>
          <div class="stats">
            <div>
              <span>原大小</span>
              <strong id="beforeSize">-</strong>
            </div>
            <div>
              <span>压缩后</span>
              <strong id="afterSize">-</strong>
            </div>
            <div>
              <span>节省</span>
              <strong id="savedSize">-</strong>
            </div>
          </div>
          <a id="downloadLink" class="download-button" href="#" download>
            <i data-lucide="download" aria-hidden="true"></i>
            <span>下载压缩视频</span>
          </a>
        </section>

        <section id="subtitleResult" class="subtitle-result is-hidden" aria-label="字幕结果">
          <div class="subtitle-head">
            <div>
              <p class="eyebrow">Subtitles</p>
              <h2>中文字幕已生成</h2>
            </div>
            <div class="result-actions">
              <a id="downloadZhSrt" class="download-button" href="#" download="translated.zh.srt">
                <i data-lucide="download" aria-hidden="true"></i>
                <span>中文字幕</span>
              </a>
              <a id="downloadBilingualSrt" class="download-button secondary" href="#" download="bilingual.srt">
                <i data-lucide="download" aria-hidden="true"></i>
                <span>双语字幕</span>
              </a>
            </div>
          </div>
          <textarea id="subtitlePreview" readonly spellcheck="false"></textarea>
        </section>

        <p id="errorBox" class="error-box is-hidden" role="alert"></p>
      </section>
    </main>

    <div id="updateToast" class="update-toast is-hidden" role="status">
      <span>发现新版本 v0.3.1</span>
      <button id="reloadUpdate" type="button">立即更新</button>
    </div>

    <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
    <script type="module" src="./app.js"></script>
  </body>
</html>
